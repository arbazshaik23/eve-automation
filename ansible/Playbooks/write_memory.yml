---
- name: Write Configs to Memory
- hosts: isp_core_routers
- gather_facts: false
- connection: network_cli

  tasks:
   - name: Verify All Configs are Saved
     cisco.ios.ios.config:
      lines:
       - write memory
     register: wr_mem
  
   - name: Display Configs were Saved
     ansible.builtin.debug:
      var: wr_mem.stdout_lines
