---
- name: Collect Full Device Data
  hosts: isp_core_routers
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Get interface IPs
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: ip_brief

    - name: Get hostname, model, serial, image
      cisco.ios.ios_command:
        commands:
          - show version
      register: show_version

    - name: Get BGP ASN and neighbors
      cisco.ios.ios_command:
        commands:
          - show ip bgp summary
      register: bgp_summary

    - name: Get interface descriptions
      cisco.ios.ios_command:
        commands:
          - show interfaces description
      register: int_description

    - name: Build JSON payload
      ansible.builtin.set_fact:
        device_data:
          hostname: "{{ inventory_hostname }}"
          show_version: "{{ show_version.stdout[0] if show_version.stdout is defined else '' }}"
          ip_brief: "{{ ip_brief.stdout[0] if ip_brief.stdout is defined else '' }}"
          bgp_summary: "{{ bgp_summary.stdout[0] if bgp_summary.stdout is defined else '' }}"
          int_description: "{{ int_description.stdout[0] if int_description.stdout is defined else '' }}"

    - name: Save all output to JSON file per device
      ansible.builtin.copy:
        content: "{{ device_data | to_nice_json }}"
        dest: "/root/eve-automation/ansible/Netbox_Data/{{ inventory_hostname }}.json"