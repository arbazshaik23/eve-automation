---
- name: Configure SR-MPLS on all ISP-CORE Routers
  hosts: isp_core_routers
  gather_facts: false
  connection: network_cli

  tasks:
    - name: Configure MPLS label range
      cisco.ios.ios_config:
        lines:
          - mpls label range 16000 1048575
        match: line

    - name: Enable global SR-MPLS
      cisco.ios.ios_config:
        lines:
          - segment-routing mpls
        match: line

    - name: Enable connected-prefix-sid-map under SR-MPLS
      cisco.ios.ios_config:
        parents: "segment-routing mpls"
        lines:
          - connected-prefix-sid-map
        match: line

    - name: Enable Segment Routing under IS-IS
      cisco.ios.ios_config:
        parents: "router isis {{ isis_process_id }}"
        lines:
          - segment-routing mpls
          - passive-interface Loopback0
        match: line

    - name: Enable MPLS on core-facing interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - mpls ip
        match: line
      loop: "{{ my_interfaces }}"
      when: item.mpls_enabled

    - name: Configure Prefix-SID on loopbacks
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "isis prefix-sid index {{ item.sr_prefix_sid }}"
        match: line
      loop: "{{ my_interfaces }}"
      when: item.sr_prefix_sid is defined

    - name: Wait for SR database to converge
      ansible.builtin.pause:
        seconds: 10

    - name: Verify SR-MPLS
      cisco.ios.ios_command:
        commands:
          - show isis neighbors
          - show ip route isis
          - show mpls forwarding-table
      register: sr_verify

    - name: Display SR verification output
      ansible.builtin.debug:
        var: sr_verify.stdout_lines